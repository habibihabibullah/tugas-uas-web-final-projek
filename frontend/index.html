<!DOCTYPE html>
<html>
<head>
    <title>CRUD Mahasiswa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h3>CRUD Mahasiswa</h3>

    <input id="nama" class="form-control mb-2" placeholder="Nama">
    <input id="nim" class="form-control mb-2" placeholder="NIM">
    <input id="jurusan" class="form-control mb-2" placeholder="Jurusan">

    <button class="btn btn-success mb-3" onclick="tambah()">Tambah</button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jurusan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="data"></tbody>
    </table>

</div>

<script src="app.js"></script>
<link rel="stylesheet" href="style.css">
</body>
</html>
